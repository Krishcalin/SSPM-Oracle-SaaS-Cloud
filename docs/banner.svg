<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C74634;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8B2F23;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1b2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6B54;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#C74634;stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)" rx="12"/>

  <!-- Grid pattern -->
  <g opacity="0.06" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="60" x2="1200" y2="60"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="400" y1="0" x2="400" y2="300"/>
    <line x1="600" y1="0" x2="600" y2="300"/>
    <line x1="800" y1="0" x2="800" y2="300"/>
    <line x1="1000" y1="0" x2="1000" y2="300"/>
  </g>

  <!-- Accent stripe -->
  <rect x="0" y="0" width="1200" height="4" fill="#FF6B54" opacity="0.8"/>
  <rect x="0" y="296" width="1200" height="4" fill="#FF6B54" opacity="0.3"/>

  <!-- Shield icon -->
  <g transform="translate(80, 80)">
    <path d="M60 0 L120 30 L120 80 C120 120 90 145 60 160 C30 145 0 120 0 80 L0 30 Z"
          fill="none" stroke="#FF6B54" stroke-width="3" opacity="0.9"/>
    <path d="M60 15 L108 40 L108 78 C108 112 82 133 60 146 C38 133 12 112 12 78 L12 40 Z"
          fill="#C74634" opacity="0.3"/>
    <text x="60" y="95" text-anchor="middle" font-family="Consolas, monospace"
          font-size="42" font-weight="bold" fill="#fff" opacity="0.95">S</text>
  </g>

  <!-- Title -->
  <text x="240" y="115" font-family="'Segoe UI', Arial, sans-serif"
        font-size="38" font-weight="700" fill="#ffffff">
    Oracle SaaS Cloud
  </text>
  <text x="240" y="158" font-family="'Segoe UI', Arial, sans-serif"
        font-size="32" font-weight="600" fill="#FF6B54">
    SSPM Security Scanner
  </text>

  <!-- Subtitle -->
  <text x="240" y="195" font-family="'Segoe UI', Arial, sans-serif"
        font-size="16" fill="#f0d0ca" opacity="0.85">
    SaaS Security Posture Management for Oracle Fusion Cloud, EPM Cloud &amp; IDCS
  </text>

  <!-- Stats boxes -->
  <g transform="translate(240, 215)">
    <rect x="0" y="0" width="120" height="42" rx="8" fill="#fff" opacity="0.08"/>
    <text x="60" y="17" text-anchor="middle" font-family="Consolas, monospace"
          font-size="11" fill="#FF6B54" font-weight="bold">55 CHECKS</text>
    <text x="60" y="34" text-anchor="middle" font-family="'Segoe UI', sans-serif"
          font-size="10" fill="#ccc">4 CIS Sections</text>

    <rect x="140" y="0" width="120" height="42" rx="8" fill="#fff" opacity="0.08"/>
    <text x="200" y="17" text-anchor="middle" font-family="Consolas, monospace"
          font-size="11" fill="#FF6B54" font-weight="bold">4 FRAMEWORKS</text>
    <text x="200" y="34" text-anchor="middle" font-family="'Segoe UI', sans-serif"
          font-size="10" fill="#ccc">CIS, NIST, ISO, SOC2</text>

    <rect x="280" y="0" width="120" height="42" rx="8" fill="#fff" opacity="0.08"/>
    <text x="340" y="17" text-anchor="middle" font-family="Consolas, monospace"
          font-size="11" fill="#FF6B54" font-weight="bold">DUAL AUTH</text>
    <text x="340" y="34" text-anchor="middle" font-family="'Segoe UI', sans-serif"
          font-size="10" fill="#ccc">OAuth 2.0 + Basic</text>

    <rect x="420" y="0" width="120" height="42" rx="8" fill="#fff" opacity="0.08"/>
    <text x="480" y="17" text-anchor="middle" font-family="Consolas, monospace"
          font-size="11" fill="#FF6B54" font-weight="bold">LIVE API</text>
    <text x="480" y="34" text-anchor="middle" font-family="'Segoe UI', sans-serif"
          font-size="10" fill="#ccc">IDCS + Fusion REST</text>
  </g>

  <!-- Decorative circuit lines -->
  <g opacity="0.08" stroke="#FF6B54" stroke-width="1" fill="none">
    <path d="M900 20 L1050 20 L1050 80 L1150 80"/>
    <circle cx="1050" cy="20" r="3" fill="#FF6B54"/>
    <path d="M950 50 L1100 50 L1100 120"/>
    <circle cx="1100" cy="50" r="3" fill="#FF6B54"/>
    <path d="M880 100 L980 100 L980 160 L1080 160"/>
    <circle cx="980" cy="100" r="3" fill="#FF6B54"/>
    <path d="M920 200 L1020 200 L1020 250 L1120 250"/>
    <circle cx="1020" cy="200" r="3" fill="#FF6B54"/>
  </g>
</svg>
